spring:
  application:
    name: ems-backend
  datasource:
    password: super
    url: jdbc:postgresql://localhost:5432/ems
    username: postgres
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database: postgresql
    database-platform: org.hibernate.dialect.postgreSQLDialect
  flyway:
    baseline-on-migration: true
    enabled: true
    user: postgres
    password: super